spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parking_db}
    username: ${DB_USER:parking_user}
    password: ${DB_PASS:parking_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:parking-system-jwt-secret-key-change-in-production-min-256-bits}
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  auto-approval:
    window-hours: 24
    scheduler-cron: "0 */15 * * * *"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
